<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디지털 광고 비중 그래프</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #eef2f7;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #1f2937;
    }

    .slide {
      width: 1200px;
      margin: 0 auto;
      padding: 24px;
      background: #eef2f7;
    }

    .card {
      background: #f3f4f6;
      border-radius: 0;
      padding: 20px 24px 24px;
      border: 1px solid #e3e5e8;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 26px;
      margin-bottom: 18px;
      padding-left: 6px;
      font-size: 16px;
      font-weight: 700;
      color: #222;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .legend-bubble {
      width: 20px;
      height: 20px;
      border: 2px solid #7c5a8e;
      border-radius: 50%;
      background: #f8f8fb;
      position: relative;
    }

    .legend-bubble::after {
      content: "";
      position: absolute;
      left: 8px;
      bottom: -6px;
      width: 2px;
      height: 8px;
      background: #7c5a8e;
      transform: rotate(25deg);
      transform-origin: top;
    }

    .legend-gray {
      width: 22px;
      height: 14px;
      background: #cfcfcf;
      border: 1px solid #333;
    }

    .legend-purple {
      width: 22px;
      height: 14px;
      background: #7d5690;
      border: 1px solid #333;
    }

    .chart-wrap {
      position: relative;
      height: 720px;
      overflow: hidden;
    }

    .svg-area {
      width: 100%;
      height: 100%;
      display: block;
    }

    .year-label {
      font-size: 18px;
      font-weight: 500;
      fill: #111;
    }

    .value-label {
      font-size: 16px;
      font-weight: 500;
      fill: #111;
    }

    .bubble-text {
      font-size: 15px;
      font-weight: 700;
      fill: #7c5a8e;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="card">
      <div class="legend">
        <div class="legend-item">
          <div class="legend-bubble"></div>
          <div>디지털 광고 비중</div>
        </div>
        <div class="legend-item">
          <div class="legend-gray"></div>
          <div>아날로그</div>
        </div>
        <div class="legend-item">
          <div class="legend-purple"></div>
          <div>디지털</div>
        </div>
      </div>

      <div class="chart-wrap">
        <svg class="svg-area" viewBox="0 0 1120 720" preserveAspectRatio="xMidYMid meet">
          <!-- baseline -->
          <line x1="50" y1="650" x2="1060" y2="650" stroke="#111" stroke-width="1.2"/>

          <!-- 2017 -->
          <g>
            <rect x="72" y="45" width="52" height="605" fill="#cfcfcf" stroke="#333" stroke-width="1"/>
            <rect x="106" y="455" width="52" height="195" fill="#7d5690" stroke="#333" stroke-width="1"/>

            <text class="value-label" x="98" y="28" text-anchor="middle">28,072</text>
            <text class="value-label" x="132" y="442" text-anchor="middle">5,953</text>

            <circle cx="132" cy="390" r="34" fill="#faf9fc" stroke="#7c5a8e" stroke-width="3"/>
            <path d="M132 424 L132 438" fill="none" stroke="#7c5a8e" stroke-width="3"/>
            <text class="bubble-text" x="132" y="396" text-anchor="middle">17.5%</text>

            <text class="year-label" x="115" y="690" text-anchor="middle">2017</text>
          </g>

          <!-- 2018 -->
          <g>
            <rect x="200" y="107" width="52" height="543" fill="#cfcfcf" stroke="#333" stroke-width="1"/>
            <rect x="234" y="398" width="52" height="252" fill="#7d5690" stroke="#333" stroke-width="1"/>

            <text class="value-label" x="226" y="90" text-anchor="middle">24,814</text>
            <text class="value-label" x="260" y="385" text-anchor="middle">9,661</text>

            <circle cx="260" cy="336" r="34" fill="#faf9fc" stroke="#7c5a8e" stroke-width="3"/>
            <path d="M260 370 L260 385" fill="none" stroke="#7c5a8e" stroke-width="3"/>
            <text class="bubble-text" x="260" y="342" text-anchor="middle">28.0%</text>

            <text class="year-label" x="243" y="690" text-anchor="middle">2018</text>
          </g>

          <!-- 2019 -->
          <g>
            <rect x="328" y="95" width="52" height="555" fill="#cfcfcf" stroke="#333" stroke-width="1"/>
            <rect x="362" y="392" width="52" height="258" fill="#7d5690" stroke="#333" stroke-width="1"/>

            <text class="value-label" x="354" y="78" text-anchor="middle">25,200</text>
            <text class="value-label" x="388" y="379" text-anchor="middle">9,942</text>

            <circle cx="388" cy="328" r="34" fill="#faf9fc" stroke="#7c5a8e" stroke-width="3"/>
            <path d="M388 362 L388 378" fill="none" stroke="#7c5a8e" stroke-width="3"/>
            <text class="bubble-text" x="388" y="334" text-anchor="middle">28.3%</text>

            <text class="year-label" x="371" y="690" text-anchor="middle">2019</text>
          </g>

          <!-- 2020 -->
          <g>
            <rect x="456" y="151" width="52" height="499" fill="#cfcfcf" stroke="#333" stroke-width="1"/>
            <rect x="490" y="447" width="52" height="203" fill="#7d5690" stroke="#333" stroke-width="1"/>

            <text class="value-label" x="482" y="134" text-anchor="middle">22,548</text>
            <text class="value-label" x="516" y="434" text-anchor="middle">8,217</text>

            <circle cx="516" cy="373" r="34" fill="#faf9fc" stroke="#7c5a8e" stroke-width="3"/>
            <path d="M516 407 L516 433" fill="none" stroke="#7c5a8e" stroke-width="3"/>
            <text class="bubble-text" x="516" y="379" text-anchor="middle">26.7%</text>

            <text class="year-label" x="499" y="690" text-anchor="middle">2020</text>
          </g>

          <!-- 2021 -->
          <g>
            <rect x="584" y="78" width="52" height="572" fill="#cfcfcf" stroke="#333" stroke-width="1"/>
            <rect x="618" y="421" width="52" height="229" fill="#7d5690" stroke="#333" stroke-width="1"/>

            <text class="value-label" x="610" y="61" text-anchor="middle">26,063</text>
            <text class="value-label" x="644" y="408" text-anchor="middle">9,603</text>

            <circle cx="644" cy="350" r="34" fill="#faf9fc" stroke="#7c5a8e" stroke-width="3"/>
            <path d="M644 384 L644 407" fill="none" stroke="#7c5a8e" stroke-width="3"/>
            <text class="bubble-text" x="644" y="356" text-anchor="middle">26.9%</text>

            <text class="year-label" x="627" y="690" text-anchor="middle">2021</text>
          </g>

          <!-- 2022 -->
          <g>
            <rect x="712" y="48" width="52" height="602" fill="#cfcfcf" stroke="#333" stroke-width="1"/>
            <rect x="746" y="330" width="52" height="320" fill="#7d5690" stroke="#333" stroke-width="1"/>

            <text class="value-label" x="738" y="31" text-anchor="middle">27,365</text>
            <text class="value-label" x="772" y="317" text-anchor="middle">12,862</text>

            <circle cx="772" cy="272" r="34" fill="#faf9fc" stroke="#7c5a8e" stroke-width="3"/>
            <path d="M772 306 L772 317" fill="none" stroke="#7c5a8e" stroke-width="3"/>
            <text class="bubble-text" x="772" y="278" text-anchor="middle">32.0%</text>

            <text class="year-label" x="755" y="690" text-anchor="middle">2022</text>
          </g>

          <!-- 2023(e) -->
          <g>
            <rect x="840" y="30" width="52" height="620" fill="#cfcfcf" stroke="#333" stroke-width="1"/>
            <rect x="874" y="320" width="52" height="330" fill="#7d5690" stroke="#333" stroke-width="1"/>

            <text class="value-label" x="866" y="13" text-anchor="middle">28,203</text>
            <text class="value-label" x="900" y="307" text-anchor="middle">14,274</text>

            <circle cx="900" cy="247" r="34" fill="#faf9fc" stroke="#7c5a8e" stroke-width="3"/>
            <path d="M900 281 L900 307" fill="none" stroke="#7c5a8e" stroke-width="3"/>
            <text class="bubble-text" x="900" y="253" text-anchor="middle">33.6%</text>

            <text class="year-label" x="883" y="690" text-anchor="middle">2023(e)</text>
          </g>

          <!-- 2024(e) -->
          <g>
            <rect x="968" y="27" width="52" height="623" fill="#cfcfcf" stroke="#333" stroke-width="1"/>
            <rect x="1002" y="312" width="52" height="338" fill="#7d5690" stroke="#333" stroke-width="1"/>

            <text class="value-label" x="994" y="10" text-anchor="middle">28,184억원</text>
            <text class="value-label" x="1028" y="299" text-anchor="middle">14,654억원</text>

            <circle cx="1028" cy="236" r="34" fill="#faf9fc" stroke="#7c5a8e" stroke-width="3"/>
            <path d="M1028 270 L1028 298" fill="none" stroke="#7c5a8e" stroke-width="3"/>
            <text class="bubble-text" x="1028" y="242" text-anchor="middle">34.2%</text>

            <text class="year-label" x="1011" y="690" text-anchor="middle">2024(e)</text>
          </g>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
