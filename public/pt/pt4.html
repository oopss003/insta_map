<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국내 DOOH 광고산업 규모</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #eef2f7;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #1f2937;
    }

    .slide {
      width: 1200px;
      margin: 0 auto;
      padding: 24px;
      background: #eef2f7;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 6px 20px rgba(36, 52, 105, 0.07);
      padding: 24px 24px 18px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      color: #2f3a4c;
      letter-spacing: -0.03em;
      line-height: 1.3;
    }

    .subline {
      width: 420px;
      height: 2px;
      background: #7d8797;
      opacity: 0.7;
    }

    .unit {
      font-size: 13px;
      color: #8c97a8;
      font-weight: 600;
      margin-top: 2px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 14px 0 10px;
      flex-wrap: wrap;
    }

    .cagr {
      font-size: 30px;
      font-weight: 800;
      color: #4b5563;
      letter-spacing: -0.03em;
    }

    .cagr .highlight {
      color: #4d5cff;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      color: #6b7280;
      font-weight: 700;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-bar {
      width: 18px;
      height: 10px;
      background: #677385;
      border-radius: 2px;
    }

    .legend-line {
      position: relative;
      width: 22px;
      height: 10px;
    }

    .legend-line::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 4px;
      height: 3px;
      background: #4d5cff;
      border-radius: 999px;
    }

    .legend-line::after {
      content: "";
      position: absolute;
      right: 0;
      top: 1px;
      width: 8px;
      height: 8px;
      background: #4d5cff;
      border-radius: 50%;
    }

    .chart-wrap {
      position: relative;
      height: 520px;
      margin-top: 10px;
      border-bottom: 1px solid #d8dde6;
      background:
        repeating-linear-gradient(
          to top,
          transparent 0,
          transparent 85px,
          #edf1f6 85px,
          #edf1f6 86px
        );
      border-radius: 14px 14px 0 0;
      overflow: hidden;
    }

    .svg-area {
      width: 100%;
      height: 100%;
      display: block;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #8c97a8;
      line-height: 1.6;
      word-break: keep-all;
    }

    .bar-label {
      font-size: 18px;
      font-weight: 700;
      fill: #7a8596;
    }

    .year-label {
      font-size: 17px;
      font-weight: 600;
      fill: #707888;
    }

    .yoy-tag-text {
      font-size: 15px;
      font-weight: 800;
      fill: #ffffff;
    }

    .yoy-line {
      fill: none;
      stroke: #4d5cff;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .yoy-dot {
      fill: #4d5cff;
    }

    .bar-color {
      fill: #677385;
    }

    .bar-color.last {
      fill: #dfe3f3;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="card">
      <div class="top-row">
        <div class="title-wrap">
          <div class="title">국내 DOOH 광고산업 규모</div>
          <div class="subline"></div>
        </div>
        <div class="unit">(단위: 억 원, %)</div>
      </div>

      <div class="meta-row">
        <div class="cagr">2017-2024 CAGR: <span class="highlight">14.9%</span></div>

        <div class="legend">
          <div class="legend-item">
            <div class="legend-bar"></div>
            <div>국내비</div>
          </div>
          <div class="legend-item">
            <div class="legend-line"></div>
            <div>YoY</div>
          </div>
        </div>
      </div>

      <div class="chart-wrap">
        <svg class="svg-area" viewBox="0 0 1100 520" preserveAspectRatio="xMidYMid meet">
          <!-- bars -->
          <rect class="bar-color" x="70"  y="279.7" width="60" height="170.3" rx="0"></rect>
          <rect class="bar-color" x="180" y="172.0" width="60" height="278.0" rx="0"></rect>
          <rect class="bar-color" x="290" y="163.2" width="60" height="286.8" rx="0"></rect>
          <rect class="bar-color" x="400" y="213.7" width="60" height="236.3" rx="0"></rect>
          <rect class="bar-color" x="510" y="169.0" width="60" height="281.0" rx="0"></rect>
          <rect class="bar-color" x="620" y="75.0"  width="60" height="375.0" rx="0"></rect>
          <rect class="bar-color" x="730" y="10.9"  width="60" height="439.1" rx="0"></rect>
          <rect class="bar-color last" x="840" y="0.0" width="60" height="450.0" rx="0"></rect>

          <!-- bar values -->
          <text class="bar-label" x="100" y="262" text-anchor="middle">5,953</text>
          <text class="bar-label" x="210" y="154" text-anchor="middle">9,669</text>
          <text class="bar-label" x="320" y="145" text-anchor="middle">9,942</text>
          <text class="bar-label" x="430" y="196" text-anchor="middle">8,217</text>
          <text class="bar-label" x="540" y="151" text-anchor="middle">9,603</text>
          <text class="bar-label" x="650" y="57"  text-anchor="middle">12,862</text>
          <text class="bar-label" x="760" y="-6"  text-anchor="middle">15,072</text>
          <text class="bar-label" x="870" y="-16" text-anchor="middle">15,762</text>

          <!-- yoy line -->
          <path class="yoy-line"
                d="M210 110
                   L320 300
                   L430 370
                   L540 255
                   L650 185
                   L760 260
                   L870 282" />

          <!-- yoy dots -->
          <circle class="yoy-dot" cx="210" cy="110" r="6"></circle>
          <circle class="yoy-dot" cx="320" cy="300" r="6"></circle>
          <circle class="yoy-dot" cx="430" cy="370" r="6"></circle>
          <circle class="yoy-dot" cx="540" cy="255" r="6"></circle>
          <circle class="yoy-dot" cx="650" cy="185" r="6"></circle>
          <circle class="yoy-dot" cx="760" cy="260" r="6"></circle>
          <circle class="yoy-dot" cx="870" cy="282" r="6"></circle>

          <!-- yoy tags -->
          <g>
            <rect x="176" y="74" width="68" height="32" rx="0" fill="#4d5cff"></rect>
            <text class="yoy-tag-text" x="210" y="95" text-anchor="middle">62.3%</text>
          </g>

          <g>
            <rect x="289" y="264" width="62" height="32" rx="0" fill="#4d5cff"></rect>
            <text class="yoy-tag-text" x="320" y="285" text-anchor="middle">2.9%</text>
          </g>

          <g>
            <rect x="393" y="384" width="74" height="32" rx="0" fill="#4d5cff"></rect>
            <text class="yoy-tag-text" x="430" y="405" text-anchor="middle">-17.4%</text>
          </g>

          <g>
            <rect x="509" y="219" width="62" height="32" rx="0" fill="#4d5cff"></rect>
            <text class="yoy-tag-text" x="540" y="240" text-anchor="middle">16.9%</text>
          </g>

          <g>
            <rect x="619" y="149" width="62" height="32" rx="0" fill="#4d5cff"></rect>
            <text class="yoy-tag-text" x="650" y="170" text-anchor="middle">33.9%</text>
          </g>

          <g>
            <rect x="729" y="224" width="62" height="32" rx="0" fill="#4d5cff"></rect>
            <text class="yoy-tag-text" x="760" y="245" text-anchor="middle">11.0%</text>
          </g>

          <g>
            <rect x="839" y="246" width="62" height="32" rx="0" fill="#4d5cff"></rect>
            <text class="yoy-tag-text" x="870" y="267" text-anchor="middle">2.7%</text>
          </g>

          <!-- x labels -->
          <text class="year-label" x="100" y="490" text-anchor="middle">2017</text>
          <text class="year-label" x="210" y="490" text-anchor="middle">2018</text>
          <text class="year-label" x="320" y="490" text-anchor="middle">2019</text>
          <text class="year-label" x="430" y="490" text-anchor="middle">2020</text>
          <text class="year-label" x="540" y="490" text-anchor="middle">2021</text>
          <text class="year-label" x="650" y="490" text-anchor="middle">2022</text>
          <text class="year-label" x="760" y="490" text-anchor="middle">2023</text>
          <text class="year-label" x="870" y="490" text-anchor="middle">2024(E)</text>
        </svg>
      </div>

      <div class="note">
        Note: 옥외광고 매체사 매출 및 제작/설치사 등 매출액까지 포함한 금액
      </div>
    </div>
  </div>
</body>
</html>
