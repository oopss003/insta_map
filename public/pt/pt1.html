<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inwave 배경 1장</title>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #e9e9ef;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    body {
      padding: 24px;
    }

    .wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .toolbar {
      width: 1920px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    button {
      border: 0;
      cursor: pointer;
      font-family: inherit;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 900;
      transition: transform .15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .save-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #c026d3 100%);
      color: white;
      box-shadow: 0 10px 24px rgba(124,58,237,0.26);
    }

    .slide {
      width: 1920px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      background:
        radial-gradient(circle at 16% 18%, rgba(183, 72, 255, 0.28), transparent 22%),
        radial-gradient(circle at 82% 18%, rgba(123, 58, 237, 0.22), transparent 20%),
        radial-gradient(circle at 70% 78%, rgba(192, 38, 211, 0.18), transparent 20%),
        radial-gradient(circle at 28% 75%, rgba(109, 40, 255, 0.14), transparent 18%),
        linear-gradient(135deg, #030304 0%, #08080d 28%, #10101a 58%, #1a1030 78%, #271147 100%);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
      isolation: isolate;
    }

    /* 미세 그리드 */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 68px 68px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.5), transparent 92%);
      opacity: 0.55;
      z-index: 1;
    }

    /* 부드러운 빛 번짐 */
    .glow-1,
    .glow-2,
    .glow-3,
    .glow-4 {
      position: absolute;
      border-radius: 999px;
      filter: blur(30px);
      z-index: 0;
      pointer-events: none;
    }

    .glow-1 {
      width: 540px;
      height: 540px;
      top: -120px;
      right: -80px;
      background: radial-gradient(circle at center, rgba(182, 72, 255, 0.22), rgba(182, 72, 255, 0.02));
    }

    .glow-2 {
      width: 460px;
      height: 460px;
      bottom: -120px;
      left: -90px;
      background: radial-gradient(circle at center, rgba(109, 40, 255, 0.20), rgba(109, 40, 255, 0.01));
    }

    .glow-3 {
      width: 300px;
      height: 300px;
      left: 32%;
      top: 24%;
      background: radial-gradient(circle at center, rgba(192, 38, 211, 0.10), rgba(192, 38, 211, 0.01));
    }

    .glow-4 {
      width: 260px;
      height: 260px;
      right: 20%;
      bottom: 18%;
      background: radial-gradient(circle at center, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    }

    /* 아주 약한 노이즈 */
    .noise {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(255,255,255,0.05) 0.6px, transparent 0.6px);
      background-size: 8px 8px;
      opacity: 0.04;
      z-index: 2;
      pointer-events: none;
    }

    /* 보라색 흐름 라인 */
    .wave {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.48;
    }

    .wave svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 1980px) {
      .toolbar {
        width: min(1920px, 100%);
      }

      .slide {
        transform: scale(0.72);
        transform-origin: top center;
        margin-bottom: -300px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <button class="save-btn" onclick="saveSlide('slide01', 'inwave_bg_01.png')">PNG 저장</button>
    </div>

    <section class="slide" id="slide01">
      <div class="glow-1"></div>
      <div class="glow-2"></div>
      <div class="glow-3"></div>
      <div class="glow-4"></div>

      <div class="wave">
        <svg viewBox="0 0 1920 1080" preserveAspectRatio="none">
          <defs>
            <linearGradient id="waveStroke1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="rgba(192,38,211,0)" />
              <stop offset="25%" stop-color="rgba(192,38,211,0.45)" />
              <stop offset="60%" stop-color="rgba(124,58,237,0.24)" />
              <stop offset="100%" stop-color="rgba(124,58,237,0)" />
            </linearGradient>

            <linearGradient id="waveStroke2" x1="1" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,0)" />
              <stop offset="40%" stop-color="rgba(216,180,254,0.18)" />
              <stop offset="70%" stop-color="rgba(192,38,211,0.20)" />
              <stop offset="100%" stop-color="rgba(255,255,255,0)" />
            </linearGradient>
          </defs>

          <path
            d="M -40 860 C 240 760, 420 940, 700 820 S 1160 650, 1460 760 S 1780 940, 1980 800"
            fill="none"
            stroke="url(#waveStroke1)"
            stroke-width="2.2"
          />

          <path
            d="M -60 250 C 220 140, 380 340, 700 230 S 1180 60, 1480 190 S 1740 380, 1980 220"
            fill="none"
            stroke="url(#waveStroke2)"
            stroke-width="1.8"
          />

          <path
            d="M 120 1040 C 420 920, 620 1060, 900 960 S 1360 820, 1740 930"
            fill="none"
            stroke="url(#waveStroke2)"
            stroke-width="1.4"
            opacity="0.55"
          />
        </svg>
      </div>

      <div class="grid"></div>
      <div class="noise"></div>
    </section>
  </div>

  <script>
    async function saveSlide(slideId, fileName) {
      const target = document.getElementById(slideId);
      const canvas = await html2canvas(target, {
        useCORS: true,
        backgroundColor: null,
        scale: 2
      });

      const link = document.createElement("a");
      link.download = fileName;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
