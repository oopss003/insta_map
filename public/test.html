```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>문제 인식 슬라이드</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Noto Sans KR', 'Pretendard', sans-serif;
  background:
    radial-gradient(circle at 20% 20%, rgba(37, 99, 235, 0.28), transparent 34%),
    radial-gradient(circle at 82% 68%, rgba(249, 115, 22, 0.13), transparent 30%),
    linear-gradient(135deg, #061428 0%, #071b38 45%, #03101f 100%);
  color: #fff;
}

.slide {
  position: relative;
  width: 1920px;
  height: 1080px;
  padding: 78px 118px 72px;
}

.grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size: 72px 72px;
  opacity: 0.45;
}

.header {
  position: relative;
  z-index: 2;
  text-align: center;
}

.kicker {
  display: inline-block;
  padding: 10px 24px;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  color: #fbbf24;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 26px;
}

h1 {
  font-size: 76px;
  line-height: 1.18;
  font-weight: 900;
  letter-spacing: -0.055em;
}

h1 span {
  color: #fbbf24;
}

.compare-area {
  position: relative;
  z-index: 2;
  margin-top: 82px;
  display: grid;
  grid-template-columns: 1fr 170px 1fr;
  align-items: center;
  gap: 34px;
}

.card {
  height: 390px;
  padding: 44px 50px;
  border-radius: 34px;
  background: linear-gradient(180deg, rgba(15, 39, 76, 0.82), rgba(6, 22, 45, 0.72));
  border: 1px solid rgba(255,255,255,0.13);
  box-shadow: 0 28px 70px rgba(0,0,0,0.25);
  backdrop-filter: blur(10px);
}

.card-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 42px;
  font-weight: 900;
  letter-spacing: -0.04em;
  margin-bottom: 36px;
}

.online .card-title {
  color: #60a5fa;
}

.offline .card-title {
  color: #fb923c;
}

.items {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.item {
  display: flex;
  align-items: center;
  gap: 18px;
  font-size: 31px;
  font-weight: 600;
  letter-spacing: -0.04em;
  color: rgba(255,255,255,0.92);
}

.check {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 22px;
  font-weight: 900;
  background: rgba(96, 165, 250, 0.18);
  color: #93c5fd;
  border: 1px solid rgba(147,197,253,0.35);
}

.no {
  background: rgba(251, 146, 60, 0.16);
  color: #fdba74;
  border-color: rgba(251,146,60,0.35);
}

.icon-dashboard,
.icon-billboard {
  width: 110px;
  height: 78px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.07);
  position: relative;
}

.icon-dashboard::before {
  content: "";
  position: absolute;
  left: 18px;
  bottom: 18px;
  width: 16px;
  height: 28px;
  background: #60a5fa;
  border-radius: 5px;
  box-shadow: 27px -15px 0 #93c5fd, 54px -4px 0 #38bdf8;
}

.icon-billboard::before {
  content: "?";
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: 52px;
  font-weight: 900;
  color: #fbbf24;
}

.icon-billboard::after {
  content: "";
  position: absolute;
  left: 45px;
  bottom: -34px;
  width: 20px;
  height: 34px;
  background: rgba(255,255,255,0.22);
  border-radius: 8px;
}

.center-question {
  height: 170px;
  border-radius: 999px;
  background: rgba(251, 191, 36, 0.12);
  border: 1px solid rgba(251, 191, 36, 0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 0 24px;
  color: #fbbf24;
  font-size: 32px;
  font-weight: 900;
  line-height: 1.25;
  letter-spacing: -0.045em;
  box-shadow: 0 0 55px rgba(251, 191, 36, 0.12);
}

.footer-message {
  position: relative;
  z-index: 2;
  margin: 72px auto 0;
  width: 1120px;
  padding: 26px 42px;
  border-radius: 24px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.13);
  text-align: center;
  font-size: 36px;
  font-weight: 700;
  line-height: 1.45;
  letter-spacing: -0.045em;
}

.footer-message strong {
  color: #fbbf24;
}

.accent-line {
  position: absolute;
  left: 118px;
  bottom: 52px;
  width: 1684px;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,0.55), rgba(251,191,36,0.55), transparent);
  z-index: 1;
}
</style>
</head>

<body>
  <section class="slide">
    <div class="grid-bg"></div>

    <header class="header">
      <div class="kicker">PROBLEM RECOGNITION</div>
      <h1>
        광고비는 지출되지만<br />
        <span>광고효과는 측정되지 않습니다</span>
      </h1>
    </header>

    <main class="compare-area">
      <div class="card online">
        <div class="card-title">
          <span>온라인 광고</span>
          <div class="icon-dashboard"></div>
        </div>
        <div class="items">
          <div class="item"><span class="check">✓</span>클릭 수 확인 가능</div>
          <div class="item"><span class="check">✓</span>체류시간 확인 가능</div>
          <div class="item"><span class="check">✓</span>전환율 확인 가능</div>
        </div>
      </div>

      <div class="center-question">
        “실제로 광고를 본<br />사람은 몇 명일까?”
      </div>

      <div class="card offline">
        <div class="card-title">
          <span>오프라인 광고</span>
          <div class="icon-billboard"></div>
        </div>
        <div class="items">
          <div class="item"><span class="check no">!</span>실제 시청자 수 확인 불가</div>
          <div class="item"><span class="check no">!</span>시청시간 확인 불가</div>
          <div class="item"><span class="check no">!</span>광고효과 설명 불가</div>
        </div>
      </div>
    </main>

    <div class="footer-message">
      온라인 광고는 <strong>측정</strong>되지만,<br />
      오프라인 광고는 아직도 <strong>추정</strong>하고 있습니다.
    </div>

    <div class="accent-line"></div>
  </section>
</body>
</html>
```
