<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<title>INWAVE Slide 01 - PROBLEM</title>

<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  font-family: "Pretendard", "Noto Sans KR", sans-serif;
  background: #f4efe3;
  color: #161b22;
}

.slide {
  position: relative;
  width: 1920px;
  height: 1080px;
  padding: 62px 76px;
  background:
    radial-gradient(circle at 12% 8%, rgba(255,255,255,0.95), transparent 28%),
    radial-gradient(circle at 90% 18%, rgba(255,199,44,0.18), transparent 28%),
    radial-gradient(circle at 55% 105%, rgba(0,116,129,0.10), transparent 35%),
    linear-gradient(135deg, #f7f1e6 0%, #f4efe3 52%, #eadfce 100%);
  overflow: hidden;
}

/* 캡쳐용 외곽 라인 */
.slide-frame {
  position: absolute;
  inset: 24px;
  border: 1px solid rgba(20, 20, 20, 0.11);
  border-radius: 34px;
  pointer-events: none;
  z-index: 50;
}

.slide-frame::before {
  content: "";
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(20, 20, 20, 0.045);
  border-radius: 26px;
}

.soft-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(7,26,61,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(7,26,61,0.035) 1px, transparent 1px);
  background-size: 58px 58px;
  opacity: 0.42;
  mask-image: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent 78%);
}

.category {
  position: relative;
  z-index: 3;
  display: inline-flex;
  align-items: center;
  height: 44px;
  padding: 0 24px;
  border-radius: 999px;
  background: rgba(255,255,255,0.78);
  border: 1px solid rgba(7,26,61,0.08);
  box-shadow:
    0 16px 34px rgba(93,72,42,0.12),
    inset 0 1px 0 rgba(255,255,255,0.9);
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 0.16em;
  color: #007481;
}

.slide-number {
  position: absolute;
  top: 66px;
  right: 82px;
  z-index: 3;
  font-size: 22px;
  font-weight: 800;
  color: rgba(22,27,34,0.34);
}

.hero {
  position: relative;
  z-index: 2;
  height: 730px;
  padding-top: 34px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.title {
  text-align: center;
  font-size: 92px;
  line-height: 1.08;
  letter-spacing: -0.065em;
  font-weight: 900;
  color: #121820;
}

.title .yellow {
  color: #ffc72c;
  text-shadow: 0 10px 26px rgba(255,199,44,0.30);
}

.visual-wrap {
  position: relative;
  margin-top: 42px;
  width: 1280px;
  height: 440px;
  border-radius: 36px;
  overflow: hidden;
  background: #d8c7ad;
  box-shadow:
    0 34px 80px rgba(84, 66, 39, 0.22),
    0 12px 28px rgba(84, 66, 39, 0.12),
    inset 0 1px 0 rgba(255,255,255,0.45);
  border: 1px solid rgba(255,255,255,0.7);
}

/* 실제 이미지가 있으면 아래 .scene 대신 img 태그 사용 */
.scene {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.10), rgba(0,0,0,0.24)),
    linear-gradient(135deg, #cdb995 0%, #927b60 47%, #423b37 100%);
}

.scene::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 22% 26%, rgba(255,255,255,0.18), transparent 22%),
    radial-gradient(circle at 72% 18%, rgba(255,199,44,0.20), transparent 20%);
}

.billboard {
  position: absolute;
  left: 86px;
  top: 64px;
  width: 610px;
  height: 255px;
  border-radius: 26px;
  background:
    radial-gradient(circle at 24% 22%, rgba(255,255,255,0.32), transparent 26%),
    linear-gradient(135deg, #0a2eff 0%, #007481 100%);
  box-shadow:
    0 28px 54px rgba(0,0,0,0.30),
    inset 0 1px 0 rgba(255,255,255,0.35);
  padding: 42px;
  color: #fff;
}

.billboard .small {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 0.10em;
  opacity: 0.76;
}

.billboard .main-copy {
  margin-top: 18px;
  font-size: 58px;
  line-height: 1.02;
  letter-spacing: -0.05em;
  font-weight: 900;
}

.floor {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 155px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.05), rgba(30,22,16,0.38)),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.16) 0 2px, transparent 2px 78px);
}

.person {
  position: absolute;
  bottom: 44px;
  width: 54px;
  height: 150px;
  opacity: 0.44;
}

.person::before {
  content: "";
  position: absolute;
  top: 0;
  left: 13px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(20,20,20,0.78);
}

.person::after {
  content: "";
  position: absolute;
  top: 38px;
  left: 6px;
  width: 42px;
  height: 95px;
  border-radius: 22px 22px 8px 8px;
  background: rgba(20,20,20,0.72);
}

.p1 { left: 760px; transform: scale(1.08); }
.p2 { left: 850px; transform: scale(0.82); opacity: 0.32; }
.p3 { left: 960px; transform: scale(1.22); opacity: 0.54; }
.p4 { left: 1100px; transform: scale(0.94); opacity: 0.36; }

.unknown-panel {
  position: absolute;
  right: 38px;
  top: 38px;
  width: 355px;
  padding: 24px;
  border-radius: 28px;
  background: rgba(255,255,255,0.78);
  border: 1px solid rgba(255,255,255,0.85);
  backdrop-filter: blur(22px);
  box-shadow: 0 24px 54px rgba(54,42,25,0.20);
}

.unknown-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid rgba(7,26,61,0.08);
}

.unknown-row:last-child {
  border-bottom: none;
}

.unknown-label {
  font-size: 21px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: rgba(22,27,34,0.58);
}

.unknown-value {
  font-size: 34px;
  line-height: 1;
  font-weight: 900;
  color: #121820;
}

.unknown-value.question {
  color: #ffc72c;
  text-shadow: 0 8px 18px rgba(255,199,44,0.28);
}

.kpi-area {
  position: relative;
  z-index: 3;
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 26px;
}

.kpi-card {
  height: 142px;
  padding: 28px 32px;
  border-radius: 28px;
  background: rgba(255,255,255,0.86);
  border: 1px solid rgba(7,26,61,0.07);
  box-shadow:
    0 24px 48px rgba(91,72,42,0.13),
    0 8px 18px rgba(91,72,42,0.08),
    inset 0 1px 0 rgba(255,255,255,0.95);
}

.kpi-label {
  font-size: 26px;
  font-weight: 850;
  letter-spacing: -0.035em;
  color: rgba(22,27,34,0.66);
}

.kpi-value {
  margin-top: 18px;
  font-size: 58px;
  line-height: 1;
  font-weight: 950;
  letter-spacing: -0.03em;
  color: #ffc72c;
  text-shadow: 0 8px 18px rgba(255,199,44,0.24);
}

.footer-message {
  position: relative;
  z-index: 3;
  margin-top: 28px;
  text-align: center;
  font-size: 31px;
  line-height: 1.35;
  font-weight: 850;
  letter-spacing: -0.04em;
  color: rgba(22,27,34,0.78);
}

.footer-message strong {
  color: #007481;
  font-weight: 950;
}
</style>
</head>

<body>
  <section class="slide">
    <div class="slide-frame"></div>
    <div class="soft-grid"></div>

    <div class="category">PROBLEM</div>
    <div class="slide-number">01</div>

    <main class="hero">
      <h1 class="title">
        하루 1,248명이 지나갑니다<br />
        하지만 광고를 본 사람은 <span class="yellow">알 수 없습니다</span>
      </h1>

      <section class="visual-wrap">
        <div class="scene">
          <div class="billboard">
            <div class="small">DIGITAL SIGNAGE</div>
            <div class="main-copy">Campaign<br />Running</div>
          </div>

          <div class="floor"></div>
          <div class="person p1"></div>
          <div class="person p2"></div>
          <div class="person p3"></div>
          <div class="person p4"></div>
        </div>

        <div class="unknown-panel">
          <div class="unknown-row">
            <div class="unknown-label">Daily Traffic</div>
            <div class="unknown-value">1,248</div>
          </div>

          <div class="unknown-row">
            <div class="unknown-label">Actual Viewers</div>
            <div class="unknown-value question">???</div>
          </div>

          <div class="unknown-row">
            <div class="unknown-label">Watch Time</div>
            <div class="unknown-value question">???</div>
          </div>

          <div class="unknown-row">
            <div class="unknown-label">ROI</div>
            <div class="unknown-value question">???</div>
          </div>
        </div>
      </section>
    </main>

    <section class="kpi-area">
      <div class="kpi-card">
        <div class="kpi-label">실제 시청자 수</div>
        <div class="kpi-value">???</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-label">평균 시청시간</div>
        <div class="kpi-value">???</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-label">광고 반응률</div>
        <div class="kpi-value">???</div>
      </div>
    </section>

    <div class="footer-message">
      광고는 운영되고 있습니다. 하지만 <strong>광고를 실제로 본 사람 수</strong>는 알 수 없습니다.
    </div>
  </section>
</body>
</html>
