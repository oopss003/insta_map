<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<title>INWAVE Slide 01 - Problem</title>

<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
  background: #031126;
  color: #ffffff;
}

.slide {
  position: relative;
  width: 1920px;
  height: 1080px;
  padding: 70px 90px;
  background:
    radial-gradient(circle at 18% 22%, rgba(10,46,255,0.45), transparent 34%),
    radial-gradient(circle at 82% 28%, rgba(255,199,44,0.16), transparent 30%),
    linear-gradient(135deg, #031126 0%, #071A3D 52%, #020914 100%);
  overflow: hidden;
}

.grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent 82%);
  opacity: 0.45;
}

.noise {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 6px 6px;
  opacity: 0.08;
}

.header {
  position: relative;
  z-index: 2;
  height: 190px;
}

.category {
  display: inline-flex;
  align-items: center;
  height: 44px;
  padding: 0 24px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  backdrop-filter: blur(20px);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: #FFC72C;
}

.title {
  margin-top: 30px;
  font-size: 82px;
  line-height: 1.12;
  font-weight: 800;
  letter-spacing: -0.045em;
}

.title span {
  color: #D6DCE5;
}

.hero {
  position: relative;
  z-index: 2;
  height: 650px;
  display: grid;
  grid-template-columns: 1fr 130px 1fr;
  gap: 28px;
  align-items: center;
}

.panel {
  position: relative;
  height: 560px;
  border-radius: 34px;
  overflow: hidden;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.online {
  background:
    radial-gradient(circle at 30% 18%, rgba(10,46,255,0.5), transparent 42%),
    linear-gradient(135deg, rgba(20,78,255,0.28), rgba(255,255,255,0.045));
}

.offline {
  background:
    radial-gradient(circle at 72% 38%, rgba(255,199,44,0.12), transparent 36%),
    linear-gradient(135deg, rgba(2,8,22,0.9), rgba(7,26,61,0.75));
}

.panel-inner {
  position: relative;
  z-index: 2;
  padding: 42px;
  height: 100%;
}

.panel-label {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.025em;
}

.panel-sub {
  margin-top: 10px;
  font-size: 22px;
  color: rgba(214,220,229,0.78);
}

.dashboard {
  margin-top: 42px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 22px;
}

.metric {
  height: 112px;
  padding: 24px;
  border-radius: 22px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
}

.metric-name {
  font-size: 21px;
  color: rgba(214,220,229,0.82);
}

.metric-value {
  margin-top: 12px;
  font-size: 34px;
  font-weight: 800;
}

.graph {
  position: absolute;
  left: 42px;
  right: 42px;
  bottom: 42px;
  height: 160px;
  border-radius: 24px;
  background: rgba(0,0,0,0.22);
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
}

.graph svg {
  width: 100%;
  height: 100%;
}

.empty-data {
  margin-top: 52px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.empty-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.11);
}

.empty-row strong {
  font-size: 28px;
  font-weight: 700;
}

.empty-row span {
  font-size: 34px;
  font-weight: 900;
  color: rgba(255,255,255,0.28);
}

.people-shadow {
  position: absolute;
  right: 40px;
  bottom: 0;
  width: 420px;
  height: 310px;
  opacity: 0.22;
}

.people-shadow::before,
.people-shadow::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 92px;
  height: 230px;
  background: linear-gradient(to bottom, rgba(255,255,255,0.35), rgba(255,255,255,0));
  border-radius: 60px 60px 0 0;
  filter: blur(1px);
}

.people-shadow::before {
  right: 160px;
}

.people-shadow::after {
  right: 50px;
  height: 280px;
}

.divider {
  height: 560px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.vs {
  width: 118px;
  height: 118px;
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,199,44,0.12);
  border: 1px solid rgba(255,199,44,0.35);
  box-shadow: 0 0 70px rgba(255,199,44,0.18);
  font-size: 38px;
  font-weight: 900;
  color: #FFC72C;
}

.footer {
  position: relative;
  z-index: 2;
  height: 140px;
  display: flex;
  align-items: center;
}

.footer-text {
  width: 100%;
  padding: 34px 44px;
  border-radius: 28px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.035em;
  text-align: center;
}

.footer-text span {
  color: #FFC72C;
}
</style>
</head>

<body>
  <section class="slide">
    <div class="grid-bg"></div>
    <div class="noise"></div>

    <header class="header">
      <div class="category">PROBLEM</div>
      <h1 class="title">
        광고는 송출되지만<br />
        <span>시청은 측정되지 않습니다</span>
      </h1>
    </header>

    <main class="hero">
      <section class="panel online">
        <div class="panel-inner">
          <div class="panel-label">온라인 광고</div>
          <div class="panel-sub">Data Visible</div>

          <div class="dashboard">
            <div class="metric">
              <div class="metric-name">클릭</div>
              <div class="metric-value">12,486</div>
            </div>
            <div class="metric">
              <div class="metric-name">체류시간</div>
              <div class="metric-value">38.2s</div>
            </div>
            <div class="metric">
              <div class="metric-name">전환율</div>
              <div class="metric-value">4.8%</div>
            </div>
            <div class="metric">
              <div class="metric-name">ROI</div>
              <div class="metric-value">312%</div>
            </div>
          </div>

          <div class="graph">
            <svg viewBox="0 0 700 160" preserveAspectRatio="none">
              <defs>
                <linearGradient id="lineGlow" x1="0" x2="1">
                  <stop offset="0%" stop-color="#0A2EFF"/>
                  <stop offset="100%" stop-color="#FFC72C"/>
                </linearGradient>
              </defs>
              <polyline
                points="0,120 80,98 160,112 240,62 320,76 400,38 500,54 600,26 700,42"
                fill="none"
                stroke="url(#lineGlow)"
                stroke-width="6"
                stroke-linecap="round"
              />
              <path
                d="M0 120 L80 98 L160 112 L240 62 L320 76 L400 38 L500 54 L600 26 L700 42 L700 160 L0 160 Z"
                fill="rgba(10,46,255,0.22)"
              />
            </svg>
          </div>
        </div>
      </section>

      <div class="divider">
        <div class="vs">VS</div>
      </div>

      <section class="panel offline">
        <div class="panel-inner">
          <div class="panel-label">오프라인 광고</div>
          <div class="panel-sub">Data Blind Spot</div>

          <div class="empty-data">
            <div class="empty-row">
              <strong>광고 송출</strong>
              <span>ON</span>
            </div>
            <div class="empty-row">
              <strong>유동인구</strong>
              <span>추정</span>
            </div>
            <div class="empty-row">
              <strong>실제 시청자 수</strong>
              <span>?</span>
            </div>
            <div class="empty-row">
              <strong>시청시간</strong>
              <span>?</span>
            </div>
            <div class="empty-row">
              <strong>광고효과</strong>
              <span>?</span>
            </div>
          </div>

          <div class="people-shadow"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-text">
        온라인 광고는 <span>측정</span>되지만, 오프라인 광고는 여전히 <span>추정</span>하고 있습니다.
      </div>
    </footer>
  </section>
</body>
</html>
